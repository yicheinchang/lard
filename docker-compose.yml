services:
  backend:
    build:
      context: ./backend
    container_name: lard-backend
    restart: unless-stopped
    volumes:
      - lard-data:/app/data
    environment:
      - LARD_DATA_DIR=/app/data
      - LARD_OLLAMA_BASE_URL=http://host.docker.internal:11434
      - LARD_OPENAI_API_KEY=${LARD_OPENAI_API_KEY:-}
      - LARD_ANTHROPIC_API_KEY=${LARD_ANTHROPIC_API_KEY:-}
      - RUNNING_IN_DOCKER=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
    container_name: lard-frontend
    restart: unless-stopped
    ports:
      - "8081:3000"
    environment:
      - INTERNAL_BACKEND_URL=http://backend:8000
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  lard-data:
