services:
  backend:
    build:
      context: ./backend
    container_name: lard-backend
    restart: unless-stopped
    volumes:
      - lard-data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/db/tracker.db
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
    container_name: lard-frontend
    restart: unless-stopped
    ports:
      - "8081:3000"
    environment:
      - INTERNAL_BACKEND_URL=http://backend:8000
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  lard-data:
